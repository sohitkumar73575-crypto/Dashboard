<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f7f6;padding-top:70px;}
.header{position:fixed;top:0;width:100%;background:#fff;padding:15px;box-shadow:0 2px 5px #ccc;z-index:1000;}
.card-box{padding:20px;border-radius:10px;color:#fff;cursor:pointer;}
.work-card{background:#fff;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="header d-flex justify-content-between">
<h5>MC Charkhi Dadri Works Management</h5>
<button onclick="toggleMenu()">☰</button>
</div>

<div class="container">

<div id="dashboard">
<div class="row g-3" id="cards"></div>
</div>

<div id="works" style="display:none;">
<div class="d-flex mb-3">
<input type="text" id="search" class="form-control me-2" placeholder="Search..." onkeyup="filterData()">
<button class="btn btn-success" onclick="addWork()">+ Add</button>
</div>
<div id="list"></div>
</div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxOKN15Szd7A3OGEM1-Xg_Jnwhg4QUibhQ4zAaFHuQBmJiUhtoyeAHFzUtEwdDrUtEFeg/exec";

let allData = [];
let currentCategory = "all";

async function load() {
  let res = await fetch(URL);
  let data = await res.json();

  allData = data.data;
  renderDashboard(data.counts);
}

function renderDashboard(c) {
  document.getElementById("cards").innerHTML = `
  <div class="col-6"><div class="card-box bg-primary" onclick="openCategory('all')">All Works (${c.all})</div></div>
  <div class="col-6"><div class="card-box bg-success" onclick="openCategory('In Progress')">In Progress (${c.inProgress})</div></div>
  <div class="col-6"><div class="card-box bg-warning" onclick="openCategory('Yet to be Allotted')">Yet (${c.yet})</div></div>
  <div class="col-6"><div class="card-box bg-info" onclick="openCategory('Live Tender')">Live (${c.live})</div></div>
  `;
}

function openCategory(cat) {
  currentCategory = cat;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("works").style.display="block";

  let filtered = allData.filter(x => cat==="all" || x.category===cat);
  renderList(filtered);
}

function renderList(data) {
  document.getElementById("list").innerHTML = data.map(d=>`
  <div class="work-card" onclick="openDetail(${d.rowIndex})">
    <b>${d.Work_Name || "-"}</b><br>
    ID: ${d.E_TENDERID || "-"}<br>
    Agency: ${d.Agency_Name || "-"}<br>
    Estimate: ₹${d.Estimate_Cost || "-"}<br>
    Agreement: ₹${d.Agreement_Amount || "-"}
  </div>
  `).join("");
}

function filterData() {
  let t = document.getElementById("search").value.toLowerCase();
  renderList(allData.filter(d =>
    JSON.stringify(d).toLowerCase().includes(t)
  ));
}

async function addWork() {
  await fetch(URL,{
    method:"POST",
    body:JSON.stringify({method:"add"})
  });
  alert("Added");
}

function openDetail(i) {
  let d = allData.find(x=>x.rowIndex===i);
  alert("Work: "+d.Work_Name);
}

window.onload = load;
</script>

</body>
</html>
