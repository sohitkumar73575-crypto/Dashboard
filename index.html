<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Charkhi Dadri | Modern Works Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #6366f1; /* Modern Indigo/Violet */
            --bg: #fdfdfd; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main); 
            overflow-x: hidden; 
        }
        
        /* Sleek Navbar */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px);
            padding: 1rem 2rem; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000; 
        }
        .navbar-brand { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; color: #fff !important; }
        
        /* Modern Stats */
        .card-stats { 
            border: 1px solid #f1f5f9; 
            border-radius: 24px; 
            background: var(--card-bg); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
        }
        .card-stats:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        /* Premium Banner */
        .investment-banner { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: white; 
            border-radius: 32px; 
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .investment-banner::after {
            content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px;
            background: var(--accent); filter: blur(120px); opacity: 0.15;
        }
        
        /* THE MODERN WORK CARD */
        .work-card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            border: 1px solid #f1f5f9; 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            cursor: pointer; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
        }
        .work-card:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.15); 
            border-color: var(--accent); 
        }
        
        /* Glassmorphism Badges */
        .status-badge { 
            font-size: 0.65rem; 
            padding: 6px 14px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
            backdrop-filter: blur(4px);
        }
        
        /* Data Styling */
        .detail-label { 
            font-size: 0.6rem; 
            font-weight: 800; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            margin-bottom: 6px; 
        }
        .detail-value { 
            font-size: 0.9rem; 
            color: var(--text-main); 
            font-weight: 600; 
        }

        .price-tag {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        /* Input Overhaul */
        .form-control {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            font-weight: 500;
        }
        .form-control:focus {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        #loadingOverlay { 
            position: fixed; inset: 0; background: #fff; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-grow text-primary" role="status"></div>
    <span class="mt-3 fw-bold opacity-75">Syncing Digital Assets...</span>
</div>

<nav class="navbar navbar-dark">
    <div class="container-fluid px-lg-5">
        <span class="navbar-brand"><i class="fa-solid fa-cube me-2 text-accent"></i>WORKS OS</span>
        <div class="d-flex align-items-center">
            <span class="text-light opacity-50 small fw-bold d-none d-md-block">MC CHARKHI DADRI</span>
        </div>
    </div>
</nav>

<div class="container-fluid py-5 px-lg-5">
    <!-- Stats Section -->
    <div class="row g-4 mb-5">
        <div class="col-6 col-md-3" onclick="filterData('All')">
            <div class="card card-stats p-4">
                <small class="detail-label">Total Portfolio</small>
                <h2 id="count-all" class="fw-bold m-0">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('In Progress')">
            <div class="card card-stats p-4">
                <small class="detail-label">In Progress</small>
                <h2 id="count-progress" class="fw-bold m-0 text-success">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('Live Tender')">
            <div class="card card-stats p-4">
                <small class="detail-label">Live Tenders</small>
                <h2 id="count-live" class="fw-bold m-0" style="color: var(--accent);">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('Yet to be Allotted')">
            <div class="card card-stats p-4">
                <small class="detail-label">Awaiting</small>
                <h2 id="count-pending" class="fw-bold m-0 text-warning">0</h2>
            </div>
        </div>
    </div>

    <!-- Investment Banner -->
    <div class="investment-banner p-4 p-md-5 mb-5 shadow-lg d-flex flex-column flex-md-row justify-content-between align-items-center">
        <div>
            <h2 class="fw-extrabold mb-1">Portfolio Valuation</h2>
            <p class="text-light opacity-50 m-0">Consolidated value of active infrastructure works</p>
        </div>
        <div class="mt-4 mt-md-0 text-md-end">
            <small class="detail-label text-light opacity-50">Active Capital</small>
            <h1 class="display-4 fw-bold m-0" id="total-progress-amount" style="color: #10b981;">₹0.00</h1>
        </div>
    </div>

    <!-- Search and Title -->
    <div class="row mb-4 align-items-center">
        <div class="col-md-6"><h3 id="viewTitle" class="fw-bold m-0">All Projects</h3></div>
        <div class="col-md-6 mt-3 mt-md-0">
            <div class="position-relative">
                <i class="fa fa-search position-absolute" style="left:20px; top:16px; color:var(--text-muted);"></i>
                <input type="text" id="searchInput" class="form-control ps-5" placeholder="Search projects, agencies, or IDs..." onkeyup="searchWorks()">
            </div>
        </div>
    </div>

    <div id="workDeck" class="row g-4"></div>
</div>

<!-- Modal Refined -->
<div class="modal fade" id="workModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-5 overflow-hidden">
            <div id="modalCaptureArea" class="bg-white p-2">
                <div class="modal-header border-0 px-4 pt-4">
                    <div>
                        <span class="badge rounded-pill mb-2" id="modalTenderId" style="background: #f1f5f9; color: var(--text-muted);"></span>
                        <h4 class="modal-title fw-extrabold" id="modalWorkName"></h4>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editForm">
                        <div id="modalContent" class="row g-3"></div>
                    </form>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 justify-content-start">
                <button id="shareBtn" class="btn btn-dark px-4 py-2 rounded-pill fw-bold" onclick="shareWorkDetails()">
                    <i class="fa-solid fa-share-nodes me-2"></i>Export Status
                </button>
                <button id="editToggleBtn" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold" onclick="enableEditMode()">
                    <i class="fa fa-edit me-2"></i>Edit
                </button>
                <button id="saveBtn" class="btn btn-primary px-5 py-2 rounded-pill fw-bold hidden" onclick="saveDetails()" style="background: var(--accent); border:none;">
                    Confirm Updates
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOKN15Szd7A3OGEM1-Xg_Jnwhg4QUibhQ4zAaFHuQBmJiUhtoyeAHFzUtEwdDrUtEFeg/exec'; 
    let masterData = [];
    let currentTenderId = null;
    let currentFilter = 'All';

    window.onload = fetchData;

    async function fetchData() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const res = await fetch(SCRIPT_URL);
            const result = await res.json();
            masterData = result.data;
            updateDashboard();
        } catch (e) { console.error("Sync Error", e); }
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function formatCurrency(num) {
        if (!num || num === "-" || num === 0) return "₹0.00";
        let val = num.toString().replace(/,/g, '').replace('₹', '').trim();
        return isNaN(parseFloat(val)) ? "₹" + num : '₹' + parseFloat(val).toLocaleString('en-IN', { minimumFractionDigits: 2 });
    }

    function updateDashboard() {
        document.getElementById('count-all').innerText = masterData.length;
        const inProg = masterData.filter(d => d.computedStatus === 'In Progress');
        document.getElementById('count-progress').innerText = inProg.length;
        document.getElementById('count-live').innerText = masterData.filter(d => d.computedStatus === 'Live Tender').length;
        document.getElementById('count-pending').innerText = masterData.filter(d => d.computedStatus === 'Yet to be Allotted').length;
        
        let totalVal = inProg.reduce((acc, curr) => {
            let cost = curr["Allotted Amount"] || curr["DNIT Cost"] || 0;
            let cleanCost = parseFloat(cost.toString().replace(/,/g, '').replace('₹','')) || 0;
            return acc + cleanCost;
        }, 0);
        document.getElementById('total-progress-amount').innerText = formatCurrency(totalVal);
        renderDeck();
    }

    function renderDeck() {
        const deck = document.getElementById('workDeck');
        deck.innerHTML = '';
        const filtered = currentFilter === 'All' ? masterData : masterData.filter(d => d.computedStatus === currentFilter);

        filtered.forEach(item => {
            const status = (item.computedStatus || "").toUpperCase();
            const tID = item.E_TENDERID || item.E_TenderID;
            const cost = item["DNIT Cost"] || item["Allotted Amount"] || 0;
            
            // Modern Dynamic Colors
            let badgeBg = "rgba(100, 116, 139, 0.1)";
            let badgeColor = "#64748b";
            
            if(status === 'IN PROGRESS') { badgeBg = "rgba(16, 185, 129, 0.1)"; badgeColor = "#10b981"; }
            else if(status === 'LIVE TENDER') { badgeBg = "rgba(99, 102, 241, 0.1)"; badgeColor = "#6366f1"; }
            else if(status === 'YET TO BE ALLOTTED') { badgeBg = "rgba(245, 158, 11, 0.1)"; badgeColor = "#f59e0b"; }

            const card = document.createElement('div');
            card.className = 'col-md-6 col-lg-4';
            card.innerHTML = `
                <div class="card work-card" onclick="showModal('${tID}')">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="status-badge" style="background:${badgeBg}; color:${badgeColor}">${status}</span>
                            <small class="fw-bold opacity-25">#${tID}</small>
                        </div>
                        <h6 class="fw-bold mb-4 lh-base" style="height:45px; overflow:hidden;">${item["Work_Name"] || item["WORK NAME"]}</h6>
                        
                        <div class="mb-4">
                            <div class="d-flex align-items-center mb-2">
                                <i class="fa-solid fa-building-user me-2 opacity-50" style="font-size:0.8rem;"></i>
                                <div class="detail-value text-truncate small">${item["Agency_Name"] || 'Awaiting Allocation'}</div>
                            </div>
                        </div>

                        <div class="pt-3 border-top d-flex justify-content-between align-items-end">
                            <div>
                                <div class="detail-label">Valuation</div>
                                <div class="price-tag">${formatCurrency(cost)}</div>
                            </div>
                            <div class="btn btn-light rounded-circle" style="width:40px; height:40px; display:grid; place-items:center;">
                                <i class="fa fa-chevron-right small"></i>
                            </div>
                        </div>
                    </div>
                </div>`;
            deck.appendChild(card);
        });
    }

    function showModal(id) {
        currentTenderId = id;
        const item = masterData.find(d => (d.E_TENDERID || d.E_TenderID) == id);
        document.getElementById('modalWorkName').innerText = item["Work_Name"] || item["WORK NAME"];
        document.getElementById('modalTenderId').innerText = "ID: " + id;
        
        const container = document.getElementById('modalContent');
        container.innerHTML = '';
        const skip = ['work_name', 'work name', 'rowindex', 'computedstatus', 'e_tenderid', 'tender id', 'e_tender id'];

        for (let key in item) {
            if (skip.includes(key.toLowerCase())) continue;
            let val = item[key] || "—";
            container.innerHTML += `
                <div class="col-md-4 col-6">
                    <div class="p-3 border rounded-4 bg-light bg-opacity-50">
                        <div class="detail-label text-nowrap">${key.replace(/_/g, ' ')}</div>
                        <div class="detail-value field-view">${key.toLowerCase().includes('cost') ? formatCurrency(val) : val}</div>
                        <input type="text" name="${key}" class="form-control field-edit hidden" value="${val}">
                    </div>
                </div>`;
        }
        document.getElementById('editToggleBtn').classList.remove('hidden');
        document.getElementById('saveBtn').classList.add('hidden');
        new bootstrap.Modal(document.getElementById('workModal')).show();
    }

    function enableEditMode() {
        document.querySelectorAll('.field-view').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.field-edit').forEach(el => el.classList.remove('hidden'));
        document.getElementById('editToggleBtn').classList.add('hidden');
        document.getElementById('saveBtn').classList.remove('hidden');
    }

    function filterData(f) { 
        currentFilter = f; 
        document.getElementById('viewTitle').innerText = (f === 'All') ? "All Projects" : f; 
        renderDeck(); 
    }

    function searchWorks() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(d => JSON.stringify(d).toLowerCase().includes(query));
        renderFilteredDeck(filtered);
    }

    function renderFilteredDeck(data) {
        const deck = document.getElementById('workDeck');
        deck.innerHTML = '';
        data.forEach(item => {
            const tID = item.E_TENDERID || item.E_TenderID;
            const card = document.createElement('div');
            card.className = 'col-md-6 col-lg-4';
            card.innerHTML = `
                <div class="card work-card p-4" onclick="showModal('${tID}')">
                    <h6 class="fw-bold mb-3">${item["Work_Name"] || item["WORK NAME"]}</h6>
                    <div class="price-tag">${formatCurrency(item["DNIT Cost"] || 0)}</div>
                </div>`;
            deck.appendChild(card);
        });
    }

    async function shareWorkDetails() {
        const capture = document.getElementById('modalCaptureArea');
        try {
            const canvas = await html2canvas(capture, { scale: 2, backgroundColor: "#ffffff" });
            canvas.toBlob(blob => {
                const file = new File([blob], `Project_${currentTenderId}.png`, { type: "image/png" });
                if (navigator.share) {
                    navigator.share({ files: [file] });
                } else {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `Project_${currentTenderId}.png`;
                    link.click();
                }
            }, 'image/png');
        } catch (err) { console.error(err); }
    }

    async function saveDetails() {
        const formData = new FormData(document.getElementById('editForm'));
        const payload = { tenderId: currentTenderId };
        formData.forEach((v, k) => { payload[k] = v; });
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateWork', details: payload }) });
            const resp = await res.json();
            if(resp.status === 'success') { fetchData(); bootstrap.Modal.getInstance(document.getElementById('workModal')).hide(); }
        } catch (e) { alert("Update Failed"); }
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
</script>
</body>
</html>
