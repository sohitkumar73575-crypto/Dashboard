<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Charkhi Dadri | Work Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* REFRESHED COLOR PALETTE - High Contrast & Modern */
        :root { 
            --primary: #0f172a;        /* Deep Navy for Header */
            --accent: #6366f1;         /* Indigo for Buttons/Links */
            --success: #10b981;        /* Emerald Green for Financials */
            --bg: #f8fafc;             /* Very Light Cool Gray Background */
            --card-border: #e2e8f0; 
            --text-main: #334155;
        }

        body { background-color: var(--bg); font-family: 'Inter', system-ui, -apple-system, sans-serif; color: var(--text-main); overflow-x: hidden; }
        
        /* Navbar with Emerald Accent */
        .navbar { background: var(--primary); padding: 1rem 2rem; border-bottom: 4px solid var(--success); box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-weight: 800; letter-spacing: 0.5px; color: #ffffff !important; }
        
        /* Stats Cards - Clean white with Top Borders */
        .card-stats { border: none; border-radius: 16px; background: white; transition: 0.3s; border-top: 5px solid transparent; cursor: pointer; }
        .card-stats:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }
        
        /* Investment Banner - High Contrast White Card */
        .investment-banner { background: #ffffff; color: var(--primary); border-radius: 24px; border: 1px solid var(--card-border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .investment-banner h1 { color: var(--success) !important; font-weight: 800; }
        
        /* Work Cards - No Blue Tint, Clean Indigo Focus */
        .work-card { 
            background: white; 
            border-radius: 20px; 
            border: 1px solid var(--card-border); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            overflow: hidden; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
        }
        .work-card:hover { 
            border-color: var(--accent); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            transform: scale(1.02);
        }
        
        /* Status Badges with Subtle Tints */
        .status-badge { font-size: 0.7rem; padding: 6px 14px; border-radius: 100px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .detail-label { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .detail-value { font-size: 0.95rem; color: #0f172a; font-weight: 600; line-height: 1.4; }
        
        /* Search Bar Style */
        #searchInput { border: 2px solid transparent; background: #ffffff; transition: 0.3s; padding: 12px 20px 12px 50px; }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); outline: none; }

        .btn-primary { background-color: var(--accent); border: none; font-weight: 700; }
        .btn-primary:hover { background-color: #4f46e5; }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-success" style="width: 3rem; height: 3rem;"></div>
    <span class="mt-3 fw-bold text-dark">Syncing Municipal Data...</span>
</div>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand m-0 fs-4"><i class="fa-solid fa-landmark-flag me-2 text-success"></i>MC CHARKHI DADRI</span>
</nav>

<div class="container-fluid py-4 px-lg-5">
    <!-- Stats Section -->
    <div class="row g-4 mb-4">
        <div class="col-6 col-md-3" onclick="filterData('All')">
            <div class="card card-stats p-4 shadow-sm" style="border-top-color: #94a3b8;">
                <small class="detail-label">Total Portfolio</small>
                <h2 id="count-all" class="fw-bold m-0">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('In Progress')">
            <div class="card card-stats p-4 shadow-sm" style="border-top-color: var(--success);">
                <small class="detail-label text-success">In Progress</small>
                <h2 id="count-progress" class="fw-bold m-0 text-success">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('Live Tender')">
            <div class="card card-stats p-4 shadow-sm" style="border-top-color: var(--accent);">
                <small class="detail-label text-primary">Live Tenders</small>
                <h2 id="count-live" class="fw-bold m-0 text-primary">0</h2>
            </div>
        </div>
        <div class="col-6 col-md-3" onclick="filterData('Yet to be Allotted')">
            <div class="card card-stats p-4 shadow-sm" style="border-top-color: #f59e0b;">
                <small class="detail-label text-warning">Pending Allotment</small>
                <h2 id="count-pending" class="fw-bold m-0 text-warning">0</h2>
            </div>
        </div>
    </div>

    <!-- Investment Banner -->
    <div class="investment-banner p-4 p-md-5 mb-5 d-flex flex-column flex-md-row justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold mb-1"><i class="fa-solid fa-chart-pie me-2 text-success"></i>Ongoing Works Status</h3>
            <p class="text-muted m-0">Live valuation of works currently in execution phase</p>
        </div>
        <div class="mt-4 mt-md-0 text-md-end">
            <small class="detail-label">Total Ongoing Investment</small>
            <h1 class="display-5 m-0" id="total-progress-amount">₹0.00</h1>
        </div>
    </div>

    <!-- Search and Title -->
    <div class="row mb-4 align-items-center">
        <div class="col-md-6"><h3 id="viewTitle" class="fw-bold text-dark m-0">All Works</h3></div>
        <div class="col-md-6">
            <div class="position-relative mt-3 mt-md-0">
                <i class="fa fa-search position-absolute" style="left:20px; top:18px; color:#94a3b8;"></i>
                <input type="text" id="searchInput" class="form-control rounded-4 shadow-sm" placeholder="Search ID, Agency or Work..." onkeyup="searchWorks()">
            </div>
        </div>
    </div>

    <div id="workDeck" class="row g-4"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="workModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden" id="modalMainContent">
            <div id="modalCaptureArea" style="background: white;">
                <div class="modal-header border-0 pb-0 px-4 pt-4 d-flex justify-content-between">
                    <div>
                        <h5 class="modal-title fw-bold text-dark" id="modalHeaderTitle">Work Details</h5>
                        <span class="badge bg-light text-secondary border mt-2" id="modalTenderId"></span>
                    </div>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" id="closeModalBtn"></button>
                </div>
                
                <div class="modal-body p-4">
                    <div class="bg-light p-4 rounded-4 mb-4 border-start border-success border-5">
                        <small class="detail-label text-success">Project Name</small>
                        <h5 id="modalWorkName" class="fw-bold text-dark mt-1 mb-0 lh-base"></h5>
                    </div>
                    <form id="editForm">
                        <div id="modalContent" class="row g-4"></div>
                    </form>
                </div>
            </div>

            <div class="modal-footer border-0 justify-content-center p-4 pt-0" id="actionArea">
                <button id="shareBtn" class="btn btn-success px-4 py-2 rounded-3 fw-bold" onclick="shareWorkDetails()">
                    <i class="fa-brands fa-whatsapp me-2"></i>Share Update
                </button>
                <button id="editToggleBtn" class="btn btn-dark px-4 py-2 rounded-3 fw-bold" onclick="enableEditMode()">
                    <i class="fa fa-edit me-2"></i>Edit
                </button>
                <button id="saveBtn" class="btn btn-primary px-5 py-2 rounded-3 fw-bold hidden" onclick="saveDetails()">
                    <i class="fa fa-save me-2"></i>Save Changes
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOKN15Szd7A3OGEM1-Xg_Jnwhg4QUibhQ4zAaFHuQBmJiUhtoyeAHFzUtEwdDrUtEFeg/exec'; 
    let masterData = [];
    let currentTenderId = null;
    let currentFilter = 'All';

    window.onload = fetchData;

    async function fetchData() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const res = await fetch(SCRIPT_URL);
            const result = await res.json();
            masterData = result.data;
            updateDashboard();
        } catch (e) { console.error("Sync Error", e); }
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function getDnitValue(item) {
        const keys = ["DNIT Cost", "DNIT COST", "DNIT_Cost", "DNIT_AMOUNT", "DNIT AMOUNT"];
        for(let k of keys) {
            if(item[k] !== undefined && item[k] !== null && item[k] !== "") return item[k];
        }
        return 0;
    }

    function formatCurrency(num) {
        if (num === undefined || num === null || num === "-" || num === "0" || num === 0) return "₹0.00";
        let val = num.toString().replace(/,/g, '').replace('₹', '').trim();
        return isNaN(parseFloat(val)) ? "₹" + num : '₹' + parseFloat(val).toLocaleString('en-IN', { minimumFractionDigits: 2 });
    }

    function updateDashboard() {
        document.getElementById('count-all').innerText = masterData.length;
        const inProg = masterData.filter(d => d.computedStatus === 'In Progress');
        document.getElementById('count-progress').innerText = inProg.length;
        document.getElementById('count-live').innerText = masterData.filter(d => d.computedStatus === 'Live Tender').length;
        document.getElementById('count-pending').innerText = masterData.filter(d => d.computedStatus === 'Yet to be Allotted').length;
        
        let totalVal = inProg.reduce((acc, curr) => {
            let cost = curr["Allotted Amount"] || getDnitValue(curr);
            let cleanCost = parseFloat(cost.toString().replace(/,/g, '').replace('₹','')) || 0;
            return acc + cleanCost;
        }, 0);
        document.getElementById('total-progress-amount').innerText = formatCurrency(totalVal);
        renderDeck();
    }

    function renderDeck() {
        const deck = document.getElementById('workDeck');
        deck.innerHTML = '';
        const filtered = currentFilter === 'All' ? masterData : masterData.filter(d => d.computedStatus === currentFilter);
        const allowedBadges = ["UNDER DLP", "IN PROGRESS", "YET TO BE ALLOTTED", "LIVE TENDER"];

        filtered.forEach(item => {
            const statusStr = (item.computedStatus || "").toUpperCase();
            const showBadge = allowedBadges.includes(statusStr);
            const dnitVal = getDnitValue(item);
            const tID = item.E_TENDERID || item.E_TenderID;

            const startDate = item["Agreement Start Date"];
            const endDate = item["Agreement End Date"];
            let durationText = "";
            
            if ((!startDate || startDate === "-" || startDate === "") && (!endDate || endDate === "-" || endDate === "")) {
                durationText = `<span class="text-danger fw-bold">AWAITING ALLOTMENT</span>`;
            } else {
                durationText = `${startDate || '-'} to ${endDate || '-'}`;
            }
            
            const card = document.createElement('div');
            card.className = 'col-md-6 col-lg-4';
            
            // Badge logic for refreshed colors
            let badgeStyle = `background:#f1f5f9; color:#475569;`;
            if(statusStr === 'IN PROGRESS') badgeStyle = `background:#ecfdf5; color:#059669;`;
            if(statusStr === 'LIVE TENDER') badgeStyle = `background:#eef2ff; color:#4f46e5;`;
            if(statusStr === 'YET TO BE ALLOTTED') badgeStyle = `background:#fff7ed; color:#ea580c;`;

            card.innerHTML = `
                <div class="card work-card shadow-sm" onclick="showModal('${tID}')">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="badge bg-light text-secondary border px-2 py-1">#${tID}</span>
                            ${showBadge ? `<span class="status-badge" style="${badgeStyle}">${item.computedStatus}</span>` : ''}
                        </div>
                        <h6 class="fw-bold text-dark mb-4 lh-base" style="height:48px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${item["Work_Name"] || item["WORK NAME"]}</h6>
                        
                        <div class="mb-4">
                            <div class="d-flex align-items-center mb-2">
                                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-2" style="width: 28px; height: 28px;">
                                    <i class="fa-solid fa-user-tie text-secondary" style="font-size: 0.8rem;"></i>
                                </div>
                                <div class="detail-value m-0 text-truncate fw-semibold" style="font-size: 0.85rem;">${item["Agency_Name"] || 'Not Assigned'}</div>
                            </div>
                            
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-2" style="width: 28px; height: 28px;">
                                    <i class="fa-solid fa-calendar-check text-secondary" style="font-size: 0.8rem;"></i>
                                </div>
                                <div class="fw-semibold text-dark" style="font-size: 0.85rem;">${durationText}</div>
                            </div>
                        </div>

                        <div class="pt-3 border-top d-flex justify-content-between align-items-center">
                            <div>
                                <div class="detail-label" style="color:var(--accent);">DNIT COST</div>
                                <div class="fw-bold text-dark fs-5">${formatCurrency(dnitVal)}</div>
                            </div>
                            <div class="btn btn-outline-secondary btn-sm rounded-circle border-0 bg-light"><i class="fa fa-chevron-right"></i></div>
                        </div>
                    </div>
                </div>`;
            deck.appendChild(card);
        });
    }

    function showModal(id) {
        currentTenderId = id;
        const item = masterData.find(d => (d.E_TENDERID || d.E_TenderID) == id);
        document.getElementById('modalWorkName').innerText = item["Work_Name"] || item["WORK NAME"];
        document.getElementById('modalTenderId').innerText = "Ref ID: " + id;
        
        const container = document.getElementById('modalContent');
        container.innerHTML = '';
        const skip = ['work_name', 'work name', 'rowindex', 'computedstatus', 'e_tenderid', 'tender id', 'e_tender id'];

        for (let key in item) {
            if (skip.includes(key.toLowerCase())) continue;
            let val = item[key] || "";
            const isCost = key.toLowerCase().includes('cost') || key.toLowerCase().includes('amount');
            const isLocked = (val && val !== "-" && val !== "0" && val !== "0.00") ? "readonly" : "";
            
            container.innerHTML += `
                <div class="col-md-4 col-6">
                    <div class="p-2">
                        <div class="detail-label">${key.replace(/_/g, ' ')}</div>
                        <div class="detail-value field-view">${isCost ? formatCurrency(val) : val}</div>
                        <input type="text" name="${key}" class="edit-input hidden field-edit" value="${val}" ${isLocked} 
                               style="border-radius:10px; border:1px solid #cbd5e1; padding:8px; width:100%;">
                    </div>
                </div>`;
        }
        document.getElementById('editToggleBtn').classList.remove('hidden');
        document.getElementById('saveBtn').classList.add('hidden');
        document.getElementById('shareBtn').classList.remove('hidden');
        new bootstrap.Modal(document.getElementById('workModal')).show();
    }

    function enableEditMode() {
        document.querySelectorAll('.field-view').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.field-edit').forEach(el => el.classList.remove('hidden'));
        document.getElementById('editToggleBtn').classList.add('hidden');
        document.getElementById('shareBtn').classList.add('hidden');
        document.getElementById('saveBtn').classList.remove('hidden');
    }

    function filterData(f) { 
        currentFilter = f; 
        document.getElementById('viewTitle').innerText = (f === 'All') ? "All Works Portfolio" : f; 
        renderDeck(); 
    }

    function searchWorks() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const deck = document.getElementById('workDeck');
        deck.innerHTML = '';
        const filtered = masterData.filter(d => JSON.stringify(d).toLowerCase().includes(query));
        
        filtered.forEach(item => {
            const tID = item.E_TENDERID || item.E_TenderID;
            const dnitVal = getDnitValue(item);
            const card = document.createElement('div');
            card.className = 'col-md-6 col-lg-4';
            card.innerHTML = `
                <div class="card work-card shadow-sm" onclick="showModal('${tID}')">
                    <div class="card-body p-4">
                        <h6 class="fw-bold text-dark mb-4 lh-base">${item["Work_Name"] || item["WORK NAME"]}</h6>
                        <div class="pt-3 border-top"><div class="detail-label">DNIT COST</div><div class="fw-bold text-dark fs-5">${formatCurrency(dnitVal)}</div></div>
                    </div>
                </div>`;
            deck.appendChild(card);
        });
    }

    async function shareWorkDetails() {
        const modal = document.getElementById('workModal');
        const capture = document.getElementById('modalCaptureArea');
        const actions = document.getElementById('actionArea');
        const close = document.getElementById('closeModalBtn');
        
        modal.classList.add('capturing');
        actions.style.display = 'none';
        close.style.opacity = '0';

        try {
            const canvas = await html2canvas(capture, { 
                scale: 2, 
                useCORS: true,
                backgroundColor: "#ffffff"
            });
            
            canvas.toBlob(blob => {
                const file = new File([blob], `Work_${currentTenderId}.png`, { type: "image/png" });
                if (navigator.share) {
                    navigator.share({ title: 'Work Status - MC Charkhi Dadri', files: [file] }).catch(e => console.log(e));
                } else {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `Work_${currentTenderId}.png`;
                    link.click();
                }
            }, 'image/png');
        } catch (err) {
            console.error("Capture failed", err);
        } finally {
            modal.classList.remove('capturing');
            actions.style.display = 'flex';
            close.style.opacity = '1';
        }
    }

    async function saveDetails() {
        const formData = new FormData(document.getElementById('editForm'));
        const payload = { tenderId: currentTenderId };
        formData.forEach((v, k) => { payload[k] = v; });
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateWork', details: payload }) });
            const resp = await res.json();
            if(resp.status === 'success') { fetchData(); bootstrap.Modal.getInstance(document.getElementById('workModal')).hide(); }
        } catch (e) { alert("Update Failed"); }
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
</script>
</body>
</html>
